<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class Time</title>
    <script src="script.js" defer></script>
    <style>
      body {
        font-family: "Roboto", sans-serif;
        text-align: center;
        margin: 0;
        padding: 0;
        background: linear-gradient(to right, #2c3e50, #4ca1af);
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      h1,
      h2 {
        margin: 10px 0;
      }

      #time-remaining {
        font-size: 2.5rem;
        margin: 20px 0;
        color: #ffeaa7;
        animation: fade-in 1s ease-in-out;
      }

      .progress-bar {
        width: 80%;
        background-color: rgba(255, 255, 255, 0.2);
        border-radius: 25px;
        margin: 20px auto;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .progress-bar-inner {
        height: 30px;
        width: 0;
        background: linear-gradient(to right, #6a11cb, #2575fc);
        text-align: center;
        line-height: 30px;
        color: white;
        border-radius: 25px;
        transition: 1.5s ease-out;
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      #event {
        color: #81ecec;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Actuellement : <span id="currentClass"></span></h1>
    <h2>Temps Restant :</h2>
    <div id="time-remaining">00:00:00</div>
    <h2>Prochain événement : <span id="event"></span></h2>
    <div class="progress-bar">
      <div class="progress-bar-inner" id="progress-bar-inner">0%</div>
    </div>
  </body>
</html>
